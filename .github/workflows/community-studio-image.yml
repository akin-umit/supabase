name: Build community Studio image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: community-studio-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/studio/Dockerfile
          target: production
          push: true
          tags: ghcr.io/akin-umit/supabase-studio:${{ github.sha }}
          cache-from: type=gha,scope=community-studio
          cache-to: type=gha,mode=max,scope=community-studio
          provenance: true
          sbom: true

      - name: Smoke test Studio runtime
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/akin-umit/supabase-studio:${GITHUB_SHA}"
          docker run --detach --name studio-smoke --publish 3000:3000 \
            --env HOSTNAME=0.0.0.0 \
            --env STUDIO_PG_META_URL=http://127.0.0.1:8080 \
            --env SUPABASE_URL=http://127.0.0.1:8000 \
            --env SUPABASE_PUBLIC_URL=http://127.0.0.1:8000 \
            --env SUPABASE_ANON_KEY=smoke-anon \
            --env SUPABASE_SERVICE_KEY=smoke-service-role \
            --env POSTGRES_PASSWORD=smoke-password \
            "$image"

          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:3000/api/platform/profile >/dev/null; then
              exit 0
            fi

            if ! docker inspect --format='{{.State.Running}}' studio-smoke | grep -qx true; then
              break
            fi
            sleep 5
          done

          docker logs studio-smoke
          exit 1

      - name: Remove smoke container
        if: always()
        run: docker rm --force studio-smoke 2>/dev/null || true
