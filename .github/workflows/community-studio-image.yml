name: Build community Studio image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: community-studio-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/studio/Dockerfile
          target: production
          push: true
          tags: ghcr.io/akin-umit/supabase-studio:${{ github.sha }}
          cache-from: type=gha,scope=community-studio
          cache-to: type=gha,mode=max,scope=community-studio
          provenance: true
          sbom: true
